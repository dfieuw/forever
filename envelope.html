<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Print Envelope</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Great+Vibes&family=Outfit:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card {
      background: white;
      width: 5in;
      padding: 2rem;
      text-align: center;
      border-radius: 12px;
      box-shadow: 0 4px 30px rgba(0,0,0,0.1);
    }
    .card-title {
      font-family: 'Great Vibes', cursive;
      font-size: 2rem;
      color: #722F37;
      margin-bottom: 0.5rem;
    }
    .card-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 300;
      color: #6B5E62;
      margin-bottom: 1.5rem;
    }
    .qr-container {
      margin: 1.5rem auto;
      width: 200px;
      height: 200px;
    }
    .qr-container svg {
      width: 100%;
      height: 100%;
    }
    .password-label {
      font-family: 'Outfit', sans-serif;
      font-size: 0.8rem;
      color: #A89A9E;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 1.5rem;
      margin-bottom: 0.3rem;
    }
    .password-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      color: #722F37;
      letter-spacing: 0.1em;
    }
    .card-footer {
      font-family: 'Great Vibes', cursive;
      font-size: 1.2rem;
      color: #B76E79;
      margin-top: 1.5rem;
    }
    .divider {
      width: 40px;
      height: 1px;
      background: #C9A96E;
      margin: 1rem auto;
    }
    .print-btn {
      margin-top: 2rem;
      padding: 0.8rem 2rem;
      background: #722F37;
      color: white;
      border: none;
      border-radius: 30px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
      letter-spacing: 0.1em;
    }
    .print-btn:hover { background: #5C2028; }
    @media print {
      body { background: white; }
      .card { box-shadow: none; border: 1px solid #eee; }
      .print-btn { display: none; }
    }
  </style>
</head>
<body>
  <div>
    <div class="card">
      <p class="card-title">One more thing...</p>
      <div class="divider"></div>
      <p class="card-subtitle">Scan this with your phone</p>
      <div class="qr-container" id="qr"></div>
      <div class="divider"></div>
      <p class="password-label">Password</p>
      <p class="password-value">marketplace</p>
      <p class="card-footer">Open it with me beside you.</p>
    </div>
    <br>
    <button class="print-btn" onclick="window.print()">Print This Card</button>
  </div>

    const qrContainer = document.getElementById('qr');

    // requires a library. Replace this SVG with a real QR code image.
    const size = 200;
    const moduleCount = 25;
    const moduleSize = size / moduleCount;

    // Encode URL into a simple visual pattern (placeholder - replace with real QR)
    // For the actual proposal, screenshot a QR code from any generator and save as images/qr.png
    qrContainer.innerHTML = `
      <div style="width:200px;height:200px;display:flex;align-items:center;justify-content:center;border:2px solid #722F37;border-radius:8px;flex-direction:column;gap:0.5rem;">
        <img src="images/qr.png" alt="QR Code" style="width:180px;height:180px;object-fit:contain;" onerror="this.parentElement.innerHTML='<p style=\\'font-size:0.8rem;color:#6B5E62;text-align:center;padding:1rem;\\'>Save a QR code for<br><strong>kris-darci-forever.netlify.app</strong><br>as images/qr.png</p>'">
      </div>

  </script>
</body>
</html>
