<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Darci & Kris | Forever</title>
  <meta name="description" content="A love story.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💍</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Great+Vibes&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ============ PASSWORD GATE ============ -->
  <div id="password-gate">
    <div class="gate-content">
      <div class="gate-icon">💌</div>
      <h1 class="gate-title">This is a Private Love Story</h1>
      <p class="gate-subtitle">Enter the password to continue</p>
      <div class="gate-input-wrap">
        <input type="password" id="password-input" placeholder="Enter password..." autocomplete="off">
        <button id="password-submit" aria-label="Submit password">→</button>
      </div>
      <p class="gate-hint">Hint: Where did we really meet? 😏</p>
      <p id="password-error" class="gate-error" hidden>That's not it, try again...</p>
    </div>
  </div>

  <!-- ============ LOADING SEQUENCE ============ -->
  <div id="loading-sequence" class="hidden">
    <div class="load-screen load-decrypt active" id="load-decrypt">
      <div class="load-dots"><span>.</span><span>.</span><span>.</span></div>
      <p class="load-text">Decrypting our memories</p>
    </div>
    <div class="load-screen load-final" data-chapter="final">
      <h2 class="load-granted">Access Granted</h2>
      <p class="load-tap">tap to begin</p>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
